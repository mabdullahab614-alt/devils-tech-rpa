<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120">
  <defs>
    <radialGradient id="footBg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="footGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b6914" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8b6914" stop-opacity="0"/>
    </linearGradient>
    <filter id="footGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="120" fill="url(#footBg)"/>

  <!-- Top divider -->
  <line x1="0" y1="20" x2="1200" y2="20" stroke="url(#footGold)" stroke-width="0.5"/>

  <!-- Center crest -->
  <g transform="translate(600, 60)" filter="url(#footGlow)">
    <!-- Outer ornamental ring -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#footGold)" stroke-width="1"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.6"/>

    <!-- Rotating gem -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        from="0" to="360" dur="15s" repeatCount="indefinite"/>
      <polygon points="0,-14 10,-4 0,12 -10,-4" fill="#d4af37"/>
      <polygon points="0,-14 10,-4 0,12 -10,-4" fill="none" stroke="#fff5c8" stroke-width="0.5"/>
      <line x1="-10" y1="-4" x2="10" y2="-4" stroke="#fff5c8" stroke-width="0.4" opacity="0.7"/>
    </g>

    <!-- Side flourishes -->
    <path d="M -60,0 Q -45,-5 -35,0" stroke="url(#footGold)" stroke-width="1" fill="none"/>
    <path d="M 60,0 Q 45,-5 35,0" stroke="url(#footGold)" stroke-width="1" fill="none"/>
    <circle cx="-60" cy="0" r="2" fill="#d4af37"/>
    <circle cx="60" cy="0" r="2" fill="#d4af37"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="105" text-anchor="middle" font-family="Georgia, serif"
    font-size="11" fill="#a89058" letter-spacing="8" font-style="italic">CLAW BOT · MMXXVI</text>
</svg>
