<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360">
  <defs>
    <linearGradient id="kBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="100%" stop-color="#0a0807"/>
    </linearGradient>
    <linearGradient id="kGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b6914"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <linearGradient id="kRowShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        from="-1 0" to="1 0" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect x="20" y="20" width="660" height="320" rx="12" fill="url(#kBg)"
    stroke="url(#kGold)" stroke-width="1.5"/>

  <!-- Title -->
  <text x="350" y="60" text-anchor="middle" font-family="Georgia, serif"
    font-size="22" fill="#d4af37" letter-spacing="6" font-weight="600">KARAT DENSITY</text>
  <text x="350" y="78" text-anchor="middle" font-family="Georgia, serif"
    font-size="10" fill="#a89058" letter-spacing="3" font-style="italic">grams per cubic centimeter</text>

  <!-- Header divider -->
  <line x1="80" y1="100" x2="620" y2="100" stroke="url(#kGold)" stroke-width="0.8" opacity="0.6"/>

  <!-- Column headers -->
  <text x="160" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="11"
    fill="#a89058" letter-spacing="3">KARAT</text>
  <text x="350" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="11"
    fill="#a89058" letter-spacing="3">DENSITY (g/cm³)</text>
  <text x="540" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="11"
    fill="#a89058" letter-spacing="3">PURITY</text>

  <!-- Row: 24K -->
  <g>
    <rect x="60" y="135" width="580" height="36" rx="4" fill="url(#kRowShine)"/>
    <text x="160" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="20"
      fill="#fff5c8" font-weight="600">24K</text>
    <text x="350" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="18"
      fill="#d4af37">19.32</text>
    <text x="540" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="13"
      fill="#a89058">99.9%</text>
  </g>

  <!-- Row: 22K (default — highlighted) -->
  <g>
    <rect x="60" y="175" width="580" height="36" rx="4" fill="#d4af37" opacity="0.12"/>
    <rect x="60" y="175" width="580" height="36" rx="4" fill="none"
      stroke="#d4af37" stroke-width="1" opacity="0.6"/>
    <text x="160" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="20"
      fill="#fff5c8" font-weight="700">22K</text>
    <text x="350" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="18"
      fill="#fff5c8" font-weight="600">17.70</text>
    <text x="540" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="13"
      fill="#d4af37">91.6%</text>
    <!-- Default badge -->
    <text x="615" y="198" text-anchor="end" font-family="Georgia, serif" font-size="9"
      fill="#d4af37" letter-spacing="2" font-style="italic">★ DEFAULT</text>
  </g>

  <!-- Row: 21K -->
  <g>
    <rect x="60" y="215" width="580" height="36" rx="4" fill="url(#kRowShine)"/>
    <text x="160" y="238" text-anchor="middle" font-family="Georgia, serif" font-size="20"
      fill="#d4af37">21K</text>
    <text x="350" y="238" text-anchor="middle" font-family="Georgia, serif" font-size="18"
      fill="#d4af37">16.50</text>
    <text x="540" y="238" text-anchor="middle" font-family="Georgia, serif" font-size="13"
      fill="#a89058">87.5%</text>
  </g>

  <!-- Row: 18K -->
  <g>
    <rect x="60" y="255" width="580" height="36" rx="4" fill="url(#kRowShine)"/>
    <text x="160" y="278" text-anchor="middle" font-family="Georgia, serif" font-size="20"
      fill="#d4af37">18K</text>
    <text x="350" y="278" text-anchor="middle" font-family="Georgia, serif" font-size="18"
      fill="#d4af37">15.58</text>
    <text x="540" y="278" text-anchor="middle" font-family="Georgia, serif" font-size="13"
      fill="#a89058">75.0%</text>
  </g>

  <!-- Row: 14K -->
  <g>
    <rect x="60" y="295" width="580" height="36" rx="4" fill="url(#kRowShine)"/>
    <text x="160" y="318" text-anchor="middle" font-family="Georgia, serif" font-size="20"
      fill="#d4af37">14K</text>
    <text x="350" y="318" text-anchor="middle" font-family="Georgia, serif" font-size="18"
      fill="#d4af37">13.07</text>
    <text x="540" y="318" text-anchor="middle" font-family="Georgia, serif" font-size="13"
      fill="#a89058">58.3%</text>
  </g>

  <!-- Decorative corner ornaments -->
  <g stroke="#d4af37" stroke-width="1" fill="none" opacity="0.6">
    <path d="M 30,30 L 50,30 M 30,30 L 30,50"/>
    <path d="M 670,30 L 650,30 M 670,30 L 670,50"/>
    <path d="M 30,330 L 50,330 M 30,330 L 30,310"/>
    <path d="M 670,330 L 650,330 M 670,330 L 670,310"/>
  </g>
</svg>
