<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200">
  <defs>
    <linearGradient id="pipeBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d0a07"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="pipeGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b6914"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <radialGradient id="nodeFill" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a2218"/>
      <stop offset="100%" stop-color="#0d0a07"/>
    </radialGradient>
    <filter id="pipeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="200" fill="url(#pipeBg)"/>

  <!-- Path connecting all nodes -->
  <path id="flowPath" d="M 100,100 L 340,100 L 580,100 L 820,100 L 1060,100"
    stroke="url(#pipeGold)" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Animated traveling particle -->
  <circle r="6" fill="#fff5c8" filter="url(#pipeGlow)">
    <animateMotion dur="5s" repeatCount="indefinite" rotate="auto">
      <mpath href="#flowPath"/>
    </animateMotion>
    <animate attributeName="r" values="4;8;4" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Stage 1: Webhook -->
  <g transform="translate(100, 100)" filter="url(#pipeGlow)">
    <circle cx="0" cy="0" r="42" fill="url(#nodeFill)" stroke="url(#pipeGold)" stroke-width="2"/>
    <text x="0" y="-2" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#d4af37">🪝</text>
    <text x="0" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#d4af37" letter-spacing="2">WEBHOOK</text>
    <text x="0" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#a89058" font-style="italic">design-approve</text>
  </g>

  <!-- Stage 2: Orchestrator -->
  <g transform="translate(340, 100)" filter="url(#pipeGlow)">
    <circle cx="0" cy="0" r="42" fill="url(#nodeFill)" stroke="url(#pipeGold)" stroke-width="2"/>
    <text x="0" y="-2" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#d4af37">🎯</text>
    <text x="0" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#d4af37" letter-spacing="2">ORCHESTRATOR</text>
    <text x="0" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#a89058" font-style="italic">dispatch</text>
  </g>

  <!-- Stage 3: Rhino Worker -->
  <g transform="translate(580, 100)" filter="url(#pipeGlow)">
    <circle cx="0" cy="0" r="42" fill="url(#nodeFill)" stroke="url(#pipeGold)" stroke-width="2"/>
    <text x="0" y="-2" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#d4af37">💎</text>
    <text x="0" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#d4af37" letter-spacing="2">RHINO WORKER</text>
    <text x="0" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#a89058" font-style="italic">volume · weight</text>
  </g>

  <!-- Stage 4: Vision -->
  <g transform="translate(820, 100)" filter="url(#pipeGlow)">
    <circle cx="0" cy="0" r="42" fill="url(#nodeFill)" stroke="url(#pipeGold)" stroke-width="2"/>
    <text x="0" y="-2" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#d4af37">👁️</text>
    <text x="0" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#d4af37" letter-spacing="2">VISION + RPA</text>
    <text x="0" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#a89058" font-style="italic">validate · click</text>
  </g>

  <!-- Stage 5: Cast -->
  <g transform="translate(1060, 100)" filter="url(#pipeGlow)">
    <circle cx="0" cy="0" r="42" fill="url(#nodeFill)" stroke="#f5d97a" stroke-width="2.5"/>
    <text x="0" y="-2" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#f5d97a">✦</text>
    <text x="0" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#f5d97a" letter-spacing="2">CAST READY</text>
    <text x="0" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#a89058" font-style="italic">→ mighty 8</text>

    <!-- Pulse ring -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#f5d97a" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="42;58;42" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Top label -->
  <text x="600" y="25" text-anchor="middle" font-family="Georgia, serif" font-size="11"
    fill="#a89058" letter-spacing="6">— PIPELINE FLOW —</text>
</svg>
