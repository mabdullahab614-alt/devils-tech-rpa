<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Obsidian background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="60%" stop-color="#0d0a07"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Gold gradients -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d97a"/>
      <stop offset="35%" stop-color="#d4af37"/>
      <stop offset="65%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>

    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fff5c8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        from="-1 0" to="1 0" dur="3.5s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Gem facet gradient -->
    <linearGradient id="facetA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff7d6"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <linearGradient id="facetB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#7a5818"/>
    </linearGradient>
    <linearGradient id="facetC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a0791f"/>
      <stop offset="100%" stop-color="#3d2c0a"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#d4af37" stroke-width="0.5">
    <line x1="0" y1="95" x2="1200" y2="95"/>
    <line x1="0" y1="190" x2="1200" y2="190"/>
    <line x1="0" y1="285" x2="1200" y2="285"/>
    <line x1="200" y1="0" x2="200" y2="380"/>
    <line x1="400" y1="0" x2="400" y2="380"/>
    <line x1="800" y1="0" x2="800" y2="380"/>
    <line x1="1000" y1="0" x2="1000" y2="380"/>
  </g>

  <!-- Floating particles -->
  <g fill="#d4af37">
    <circle cx="120" cy="80" r="1.5" opacity="0.6">
      <animate attributeName="cy" values="80;60;80" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="280" r="1" opacity="0.5">
      <animate attributeName="cy" values="280;250;280" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="950" cy="120" r="1.2" opacity="0.5">
      <animate attributeName="cy" values="120;95;120" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.15;0.5" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="300" r="1" opacity="0.4">
      <animate attributeName="cy" values="300;275;300" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="190" r="1.3" opacity="0.5">
      <animate attributeName="cy" values="190;165;190" dur="7.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1140" cy="200" r="1" opacity="0.4">
      <animate attributeName="cy" values="200;180;200" dur="6.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- LEFT: Rotating 3D gem -->
  <g transform="translate(220, 190)" filter="url(#goldGlow)">
    <g>
      <!-- Outer rotation -->
      <animateTransform attributeName="transform" type="rotate"
        from="0" to="360" dur="20s" repeatCount="indefinite"/>

      <!-- Gem body — diamond/marquise shape with facets -->
      <g>
        <!-- Top crown facets -->
        <polygon points="0,-90 -45,-30 0,0" fill="url(#facetA)" opacity="0.95"/>
        <polygon points="0,-90 0,0 45,-30" fill="url(#facetB)" opacity="0.85"/>
        <polygon points="-45,-30 -70,0 -35,15 0,0" fill="url(#facetB)" opacity="0.7"/>
        <polygon points="45,-30 0,0 35,15 70,0" fill="url(#facetC)" opacity="0.75"/>

        <!-- Pavilion (bottom) facets -->
        <polygon points="-70,0 -35,15 0,80" fill="url(#facetC)" opacity="0.85"/>
        <polygon points="-35,15 0,0 35,15 0,80" fill="url(#facetB)" opacity="0.95"/>
        <polygon points="35,15 70,0 0,80" fill="url(#facetC)" opacity="0.7"/>

        <!-- Outline -->
        <polygon points="0,-90 -70,0 0,80 70,0" fill="none" stroke="#f5d97a" stroke-width="1" opacity="0.8"/>
        <line x1="-45" y1="-30" x2="45" y2="-30" stroke="#f5d97a" stroke-width="0.5" opacity="0.4"/>
        <line x1="-35" y1="15" x2="35" y2="15" stroke="#f5d97a" stroke-width="0.5" opacity="0.4"/>
        <line x1="0" y1="-90" x2="0" y2="80" stroke="#f5d97a" stroke-width="0.5" opacity="0.3"/>
      </g>
    </g>

    <!-- Sparkles -->
    <g fill="#fff5c8">
      <circle cx="-15" cy="-50" r="2">
        <animate attributeName="r" values="0;3;0" dur="2s" begin="0s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0s" repeatCount="indefinite"/>
      </circle>
      <circle cx="20" cy="20" r="2">
        <animate attributeName="r" values="0;2.5;0" dur="2.5s" begin="0.7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="2.5s" begin="0.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-20" cy="40" r="1.5">
        <animate attributeName="r" values="0;2;0" dur="3s" begin="1.3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="3s" begin="1.3s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- CENTER: Title + tagline -->
  <g transform="translate(600, 175)">
    <!-- Decorative top line -->
    <line x1="-180" y1="-65" x2="-40" y2="-65" stroke="url(#goldGrad)" stroke-width="1"/>
    <circle cx="0" cy="-65" r="3" fill="url(#goldGrad)"/>
    <line x1="40" y1="-65" x2="180" y2="-65" stroke="url(#goldGrad)" stroke-width="1"/>

    <!-- Subtitle above -->
    <text x="0" y="-40" text-anchor="middle"
      font-family="Georgia, serif" font-size="13" letter-spacing="6"
      fill="#a89058" opacity="0.8">JEWELRY · CAD · PIPELINE</text>

    <!-- Main title -->
    <text x="0" y="15" text-anchor="middle"
      font-family="Georgia, serif" font-weight="700" font-size="78"
      fill="url(#goldGrad)" letter-spacing="8" filter="url(#softGlow)">CLAW BOT</text>

    <!-- Shimmer overlay -->
    <text x="0" y="15" text-anchor="middle"
      font-family="Georgia, serif" font-weight="700" font-size="78"
      fill="url(#goldShine)" letter-spacing="8" opacity="0.7">CLAW BOT</text>

    <!-- Tagline -->
    <text x="0" y="55" text-anchor="middle"
      font-family="Georgia, serif" font-style="italic" font-size="16"
      fill="#a89058" letter-spacing="2">— from rhino to ring, untouched —</text>

    <!-- Decorative bottom line -->
    <line x1="-180" y1="80" x2="-40" y2="80" stroke="url(#goldGrad)" stroke-width="1"/>
    <circle cx="0" cy="80" r="3" fill="url(#goldGrad)"/>
    <line x1="40" y1="80" x2="180" y2="80" stroke="url(#goldGrad)" stroke-width="1"/>
  </g>

  <!-- RIGHT: Counter-rotating wireframe ring -->
  <g transform="translate(980, 190)" filter="url(#goldGlow)">
    <g>
      <animateTransform attributeName="transform" type="rotate"
        from="360" to="0" dur="25s" repeatCount="indefinite"/>

      <!-- Ring band — multiple ellipses for 3D effect -->
      <ellipse cx="0" cy="0" rx="80" ry="28" fill="none"
        stroke="url(#goldGrad)" stroke-width="2" opacity="0.9"/>
      <ellipse cx="0" cy="0" rx="80" ry="28" fill="none"
        stroke="#d4af37" stroke-width="0.5" opacity="0.4" transform="rotate(20)"/>
      <ellipse cx="0" cy="0" rx="80" ry="28" fill="none"
        stroke="#d4af37" stroke-width="0.5" opacity="0.4" transform="rotate(-20)"/>
      <ellipse cx="0" cy="0" rx="65" ry="20" fill="none"
        stroke="#a89058" stroke-width="0.8" opacity="0.6"/>

      <!-- Vertical wireframe lines -->
      <line x1="-80" y1="0" x2="80" y2="0" stroke="#d4af37" stroke-width="0.5" opacity="0.5"/>
      <line x1="0" y1="-28" x2="0" y2="28" stroke="#d4af37" stroke-width="0.5" opacity="0.3"/>

      <!-- Setting prongs (claw bot — claws!) -->
      <g stroke="url(#goldGrad)" stroke-width="2" fill="none" stroke-linecap="round">
        <line x1="-40" y1="-20" x2="-40" y2="-45"/>
        <line x1="40" y1="-20" x2="40" y2="-45"/>
        <line x1="-15" y1="-26" x2="-15" y2="-50"/>
        <line x1="15" y1="-26" x2="15" y2="-50"/>
      </g>

      <!-- Center stone -->
      <polygon points="0,-58 -22,-38 0,-25 22,-38" fill="url(#facetA)" opacity="0.9"/>
      <polygon points="0,-58 -22,-38 0,-25 22,-38" fill="none" stroke="#fff5c8" stroke-width="0.8"/>
      <line x1="-22" y1="-38" x2="22" y2="-38" stroke="#fff5c8" stroke-width="0.5" opacity="0.6"/>
    </g>
  </g>
</svg>
